name: Deploy to Branch Place

on:
  push:
    branches:
      - deployment-test

jobs:
  setup:
    uses: ./.github/workflows/setup.yaml
    with:
      aftman: true

  deploy:
    runs-on: ubuntu-latest
    needs: setup
    env:
      DEPLOYMENT_PLACE_FILE: deployment_place.rbxl
      VERSION_TYPE: published
      MAX_REATTEMPTS: 20
      REATTEMPT_WAIT_TIME: 30

    steps:
      - name: Set environment based on branch
        run: |
          echo "[ENV] Setting env vars for branch: $GITHUB_REF_NAME"

          if [[ "$GITHUB_REF_NAME" == "deployment-test" ]]; then
            echo "PLACE_ID=${{ secrets.DEPLOYMENT_TESTING_PLACE_ID }}" >> $GITHUB_ENV
            echo "UNIVERSE_ID=${{ secrets.DEPLOYMENT_TESTING_UNIVERSE_ID }}" >> $GITHUB_ENV
            echo "PLACE_PUBLISHING_API_KEY=${{ secrets.DEPLOYMENT_TESTING_PLACE_PUBLISHING_API_KEY }}" >> $GITHUB_ENV
            echo "PLACE_FILE=production_place.rbxl" >> $GITHUB_ENV
          fi

      - name: Debug secret lengths
        run: |
          echo "[DEBUG] Place ID length: ${#PLACE_ID}"
          echo "[DEBUG] Universe ID length: ${#UNIVERSE_ID}"
          echo "[DEBUG] API key length: ${#PLACE_PUBLISHING_API_KEY}"

      - name: Build ${{ env.PLACE_FILE }} with Rojo
        run: |
          set -euo pipefail
          if [[ -f default.project.json ]]; then
            echo "[BUILD] Found Rojo project - building $PLACE_FILE..."
            rojo build -o "$PLACE_FILE"
          else
            echo "[BUILD] Rojo project file not found - unable to build $PLACE_FILE."
            exit 1
          fi

      - name: Publish to Roblox DevSite place and reattempt if necessary
        run: |
          set -euo pipefail

          if [[ ! -f "$PLACE_FILE" ]]; then
            echo "[PUBLISH] $PLACE_FILE not found - skipping publish."
            exit 0
          fi

          reattempt_count=0
          reattempt_wait_time=$REATTEMPT_WAIT_TIME

          while [[ $reattempt_count -le $MAX_REATTEMPTS ]]; do
            if [[ $reattempt_count -gt 0 ]]; then
              echo "[PUBLISH] Reattempting to publish $PLACE_FILE to Roblox ($reattempt_count of $MAX_REATTEMPTS)..."
            else
              echo "[PUBLISH] Attempting to publish $PLACE_FILE to Roblox..."
            fi

            set +e
            output=$(rbxcloud experience publish \
              --api-key "$PLACE_PUBLISHING_API_KEY" \
              --filename "$PLACE_FILE" \
              --place-id "$PLACE_ID" \
              --universe-id "$UNIVERSE_ID" \
              --version-type "$VERSION_TYPE" 2>&1)
            status=$?
            set -e

            echo "$output"

            if echo "$output" | grep -q "409"; then
              if [[ $reattempt_count -lt $MAX_REATTEMPTS ]]; then
                echo "[PUBLISH] Server busy (409 Error). Waiting $reattempt_wait_time seconds before reattempt..."
                sleep "$reattempt_wait_time"
                reattempt_wait_time=$((reattempt_wait_time * 2))
                reattempt_count=$((reattempt_count + 1))
              else
                echo "[PUBLISH] Server busy (409 Error) but no reattempts left."
                exit 1
              fi
            elif [[ $status -eq 0 ]]; then
              echo "[PUBLISH] Successfully published $PLACE_FILE to Roblox!"
              exit 0
            else
              echo "[PUBLISH] An error occurred while publishing $PLACE_FILE (exit $status)."

              if command -v jq >/dev/null 2>&1 && echo "$output" | jq -e . >/dev/null 2>&1; then
                err_msg=$(echo "$output" | jq -r '..|.message? // empty' | head -n1)
                err_code=$(echo "$output" | jq -r '..|.code? // empty' | head -n1)

                if [[ -n "$err_msg" ]]; then
                  echo "[PUBLISH] Error message: $err_msg"
                fi
                if [[ -n "$err_code" ]]; then
                  echo "[PUBLISH] Error code: $err_code"
                fi
              fi

              printf "[PUBLISH] Error output:\n%s\n" "$output"
              exit "$status"
            fi
          done

          echo "[PUBLISH] Max reattempts reached. Exiting..."
          exit 1
